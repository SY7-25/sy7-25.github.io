<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>自动贩卖机</title>
<style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#eee;font-family:Arial;padding:30px}
    .container{max-width:600px;margin:0 auto;background:#222;border-radius:15px;padding:25px}
    .title{text-align:center;color:#fff;margin-bottom:20px;font-size:24px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    .item{background:#fff;border-radius:8px;padding:15px;text-align:center;cursor:pointer}
    .item.selected{background:#ffd700}
    .name{font-weight:bold;margin-bottom:5px}
    .price{color:#e63946;font-size:14px}
    .panel{background:#fff;border-radius:8px;padding:15px;text-align:center}
    .total{font-size:18px;margin:10px 0}
    button{padding:10px 20px;margin:5px;background:#2196F3;color:#fff;border:none;border-radius:5px;cursor:pointer}
    button:disabled{background:#ccc}
</style>
</head>
<body>
<div class="container">
  <h2 class="title">自动贩卖机</h2>
  <div class="grid" id="goodsGrid">
    <div class="item" data-name="矿泉水" data-price="2"><div class="name">01 矿泉水</div><div class="price">¥2</div></div>
    <div class="item" data-name="可乐" data-price="3"><div class="name">02 可乐</div><div class="price">¥3</div></div>
    <div class="item" data-name="雪碧" data-price="3"><div class="name">03 雪碧</div><div class="price">¥3</div></div>
    <div class="item" data-name="芬达" data-price="3"><div class="name">04 芬达</div><div class="price">¥3</div></div>
    <div class="item" data-name="红茶" data-price="4"><div class="name">05 红茶</div><div class="price">¥4</div></div>
    <div class="item" data-name="绿茶" data-price="4"><div class="name">06 绿茶</div><div class="price">¥4</div></div>
    <div class="item" data-name="咖啡" data-price="5"><div class="name">07 咖啡</div><div class="price">¥5</div></div>
    <div class="item" data-name="牛奶" data-price="5"><div class="name">08 牛奶</div><div class="price">¥5</div></div>
    <div class="item" data-name="薯片" data-price="6"><div class="name">09 薯片</div><div class="price">¥6</div></div>
    <div class="item" data-name="巧克力" data-price="7"><div class="name">10 巧克力</div><div class="price">¥7</div></div>
    <div class="item" data-name="面包" data-price="4"><div class="name">11 面包</div><div class="price">¥4</div></div>
    <div class="item" data-name="口香糖" data-price="2"><div class="name">12 口香糖</div><div class="price">¥2</div></div>
  </div>

  <div class="panel">
    数量：
    <button onclick="subQty()">-</button>
    <span id="qty">1</span>
    <button onclick="addQty()">+</button>

    <div class="total">
      已选：<span id="selectedText">无</span> 
      总价：¥<span id="totalPrice">0</span>
    </div>

    <button id="buyBtn" disabled>确认购买</button>
    <button id="cancelBtn">取消</button>
    <div id="msg" style="color:green;margin-top:8px"></div>
  </div>
</div>

<script>
let currentItem = null;
let qty = 1;

// 点击选择商品
document.getElementById('goodsGrid').onclick = function(e) {
  let items = document.querySelectorAll('.item');
  items.forEach(i => i.classList.remove('selected'));

  let item = e.target.closest('.item');
  if (!item) return;

  item.classList.add('selected');
  currentItem = {
    name: item.dataset.name,
    price: Number(item.dataset.price)
  };

  update();
  document.getElementById('buyBtn').disabled = false;
};

// 数量 +
function addQty() {
  if (!currentItem) return;
  qty++;
  if (qty > 10) qty = 10;
  update();
}

// 数量 -
function subQty() {
  if (!currentItem) return;
  qty--;
  if (qty < 1) qty = 1;
  update();
}

// 更新显示
function update() {
  document.getElementById('qty').innerText = qty;
  document.getElementById('selectedText').innerText = currentItem.name;
  document.getElementById('totalPrice').innerText = currentItem.price * qty;
}

// 购买
document.getElementById('buyBtn').onclick = function() {
  let total = currentItem.price * qty;
  document.getElementById('msg').innerText = 
    "✅ 出货：" + currentItem.name + " ×" + qty + "  总计 ¥" + total;
};

// 取消
document.getElementById('cancelBtn').onclick = function() {
  currentItem = null;
  qty = 1;
  document.querySelectorAll('.item').forEach(i => i.classList.remove('selected'));
  document.getElementById('qty').innerText = 1;
  document.getElementById('selectedText').innerText = "无";
  document.getElementById('totalPrice').innerText = "0";
  document.getElementById('buyBtn').disabled = true;
  document.getElementById('msg').innerText = "";
};
</script>
</body>
</html>
